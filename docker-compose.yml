# Production compose: uses Neon for DB1 + DB2 (no local Postgres containers)

networks:
  prosgres-docker-prisma:
    name: prosgres-docker-prisma
    driver: bridge

services:
  bun-backend:
    env_file:
      - ./Flexi-Backend/.env
    build:
      context: ./Flexi-Backend
      dockerfile: Dockerfile.bun
    container_name: bunexpress
    ports:
      - 3010:3000
    restart: always
    networks:
      - prosgres-docker-prisma
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  expo-web:
    build:
      context: ./Flexi-Frontend
      dockerfile: Dockerfile
    container_name: expo-web
    ports:
      - 8080:80
    networks:
      - prosgres-docker-prisma
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./Flexi-Backend/ssl:/etc/ssl
      - ./Flexi-Frontend/dist:/usr/share/nginx/html
    ports:
      - 80:80
      - 443:443
    restart: always
    depends_on:
      - bun-backend
      - expo-web
    networks:
      - prosgres-docker-prisma
